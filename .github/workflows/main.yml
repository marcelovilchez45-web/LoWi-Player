name: Build and Release CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --include=optional

      - name: Fix Tailwind Native Bindings
        run: |
          if [ ! -d "node_modules/@tailwindcss/oxide-linux-x64-gnu" ]; then
            echo "⚠️ Native binding missing. Forcing installation..."
            npm install @tailwindcss/oxide-linux-x64-gnu --no-save
          fi

      - name: Build Web Application
        run: npm run build

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Build Android APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hifi-player-apk
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk

  build-ios:
    name: Build iOS App
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --include=optional

      - name: Fix Tailwind Native Bindings
        run: |
          if [ ! -d "node_modules/@tailwindcss/oxide-darwin-arm64" ]; then
            echo "⚠️ Native binding missing. Forcing installation..."
            npm install @tailwindcss/oxide-darwin-arm64 --no-save
          fi

      - name: Build Web Application
        run: npm run build

      - name: Capacitor Sync
        run: npx cap sync ios

      - name: Build iOS App (No Signing)
        working-directory: ios/App
        run: xcodebuild -scheme App -workspace App.xcworkspace -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO

      - name: Upload iOS App
        uses: actions/upload-artifact@v4
        with:
          name: hifi-player-ios
          path: ios/App/build/Release-iphoneos/App.app
